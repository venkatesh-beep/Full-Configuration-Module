name: Build Windows Desktop Installer

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish artifacts to a GitHub Release for the current ref"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build NSIS Setup.exe
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip; python -m pip install -r requirements.txt pyinstaller

      - name: Build backend executable
        if: ${{ github.event_name != 'push' && inputs.publish_release != 'true' }}
        run: npm run python:build

      - name: Build Windows installer
        if: ${{ github.event_name != 'push' && inputs.publish_release != 'true' }}
        run: npm run dist:electron

      - name: Build and publish GitHub release assets
        if: ${{ github.event_name == 'push' || inputs.publish_release == 'true' }}
        run: npm run release:github

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: configuration-portal-windows-installer
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
