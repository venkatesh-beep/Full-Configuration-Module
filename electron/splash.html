<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'none'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Configuration Portal</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      font-family: Segoe UI, Arial, sans-serif;
      background: radial-gradient(circle at top, #28426d, #111827 58%, #050712);
      color: #f8fafc;
      overflow: hidden;
    }
    .card {
      width: min(520px, calc(100vw - 48px));
      padding: 42px 38px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 22px;
      background: rgba(15, 23, 42, .78);
      box-shadow: 0 28px 80px rgba(0,0,0,.35);
      text-align: center;
      backdrop-filter: blur(16px);
    }
    .gear {
      width: 72px;
      height: 72px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
      border-radius: 22px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      font-size: 42px;
      animation: pulse 1.8s ease-in-out infinite;
    }
    h1 { margin: 0 0 10px; font-size: 28px; font-weight: 700; letter-spacing: .2px; }
    p { margin: 0; color: #cbd5e1; line-height: 1.5; }
    .bar { height: 5px; margin-top: 30px; border-radius: 999px; background: rgba(148,163,184,.22); overflow: hidden; }
    .bar::before { content: ''; display: block; height: 100%; width: 42%; border-radius: inherit; background: #38bdf8; animation: load 1.25s ease-in-out infinite; }
    @keyframes load { 0% { transform: translateX(-110%); } 100% { transform: translateX(255%); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.045); } }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="gear" aria-hidden="true">⚙️</div>
    <h1>Configuration Portal</h1>
    <p>Starting the secure local application server…</p>
    <div class="bar" aria-hidden="true"></div>
  </main>
</body>
</html>
